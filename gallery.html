<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Gallery — KIOR, The Door Cafe</title>
<meta name="description" content="Inside KIOR — The Door Cafe, Jagatpura, Jaipur. The courtyard, the coffee, the plates and the vibe." />
<meta name="theme-color" content="#14110E" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="css/style.css" />
</head>
<body>
<main>
  <section class="page-hero" style="--hero-img:url('assets/img/space-3.jpg')">
    <div class="page-hero-veil"></div>
    <div class="page-hero-inner">
      <p class="eyebrow">Inside KIOR</p>
      <h1 class="page-title split">Gallery</h1>
      <p class="page-lead">Warm lights, an open courtyard, and food that photographs itself.</p>
    </div>
  </section>

  <section class="gallery gallery-full">
    <div class="gallery-grid">
      <figure class="g-tall reveal-card"><img src="assets/img/space-1.jpg" alt="The door" loading="lazy" /></figure>
      <figure class="reveal-card"><img src="assets/img/hot-sips.jpg" alt="Hot sips" loading="lazy" /></figure>
      <figure class="reveal-card"><img src="assets/img/iced-latte.jpg" alt="Iced latte" loading="lazy" /></figure>
      <figure class="g-wide reveal-card"><img src="assets/img/space-2.jpg" alt="Courtyard" loading="lazy" /></figure>
      <figure class="reveal-card"><img src="assets/img/mojitos.jpg" alt="Mojitos" loading="lazy" /></figure>
      <figure class="reveal-card"><img src="assets/img/watermelon-mojito.jpg" alt="Watermelon mojito" loading="lazy" /></figure>
      <figure class="g-tall reveal-card"><img src="assets/img/space-3.jpg" alt="KIOR signage" loading="lazy" /></figure>
      <figure class="reveal-card"><img src="assets/img/burger.jpg" alt="Burger" loading="lazy" /></figure>
      <figure class="reveal-card"><img src="assets/img/hawa-mahal-pasta.jpg" alt="Hawa Mahal Pasta" loading="lazy" /></figure>
      <figure class="g-wide reveal-card"><img src="assets/img/coffee-plans.jpg" alt="Coffee plans at KIOR" loading="lazy" /></figure>
      <figure class="reveal-card"><img src="assets/img/momos.jpg" alt="Momos" loading="lazy" /></figure>
      <figure class="reveal-card"><img src="assets/img/plate.jpg" alt="A full plate" loading="lazy" /></figure>
    </div>
  </section>

  <section class="cta-band" style="--hero-img:url('assets/img/space-1.jpg')">
    <div class="page-hero-veil"></div>
    <div class="cta-band-inner">
      <h2 class="reveal split">Hungry yet?</h2>
      <a href="menu.html" class="btn btn-solid reveal">See the menu →</a>
    </div>
  </section>
</main>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
<script src="js/layout.js"></script>
<script src="js/main.js"></script>
</body>
</html>
